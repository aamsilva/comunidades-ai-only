# Prometheus Configuration — Comunidades AI-Only

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'a2a-relay'
    static_configs:
      - targets: ['relay:9090']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'a2a-indexer'
    static_configs:
      - targets: ['indexer:8080']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
