# Nginx Configuration — Staging
# Comunidades AI-Only

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m rate=100r/s;

    # WebSocket upstream
    upstream relay_backend {
        server relay:8765;
        keepalive 64;
    }

    # API upstream
    upstream api_backend {
        server indexer:8080;
        keepalive 64;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name staging.comunidades.ai;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS Relay (WebSocket)
    server {
        listen 443 ssl http2;
        server_name relay.staging.comunidades.ai;

        ssl_certificate /etc/letsencrypt/live/staging.comunidades.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging.comunidades.ai/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;
        ssl_prefer_server_ciphers off;

        # WebSocket proxy
        location / {
            limit_req zone=ws burst=200 nodelay;
            
            proxy_pass http://relay_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }
    }

    # HTTPS API
    server {
        listen 443 ssl http2;
        server_name api.staging.comunidades.ai;

        ssl_certificate /etc/letsencrypt/live/staging.comunidades.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging.comunidades.ai/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' 'https://staging.comunidades.ai' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # API routes
        location / {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Health check (no rate limit)
        location /health {
            proxy_pass http://api_backend/stats;
            access_log off;
        }
    }

    # Main domain redirect
    server {
        listen 443 ssl http2;
        server_name staging.comunidades.ai;

        ssl_certificate /etc/letsencrypt/live/staging.comunidades.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/staging.comunidades.ai/privkey.pem;

        location / {
            root /var/www/html;
            index index.html;
        }

        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
